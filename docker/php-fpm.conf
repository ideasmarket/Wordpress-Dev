[www]
; Listen on TCP socket — nginx proxies to this
listen = 127.0.0.1:9000

; Process management — ondemand saves RAM on low-traffic client sites
; Switch to static or dynamic if the site has consistent traffic
pm = ondemand
pm.max_children = 10
pm.process_idle_timeout = 10s
pm.max_requests = 500

; Expose FPM status endpoint — useful for healthchecks and monitoring
pm.status_path = /status

; Pass real client IP through nginx proxy
request_terminate_timeout = 60s

; Log worker stdout/stderr to Docker log collector
catch_workers_output = yes
decorate_workers_output = no

; PHP runtime overrides for WordPress
php_admin_value[memory_limit] = 256M
php_admin_value[upload_max_filesize] = 64M
php_admin_value[post_max_size] = 64M
php_admin_value[max_execution_time] = 60
php_admin_value[expose_php] = Off

; Point errors to stderr so Docker captures them
php_admin_flag[log_errors] = on
php_admin_value[error_log] = /dev/stderr
